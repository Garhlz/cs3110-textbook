## 使用建议

### 规则 1: 第一次出现规则
- 对于重要术语首次出现时，可使用"英文（中文）"格式
- 例：`functor（函子）`、`monad（单子）`
- 后续出现优先使用英文，避免与数学概念混淆

### 规则 2: 技术对象保留英文
- OCaml 内置类型、函数、模块名保留英文
- 例：`List.map`, `Array.length`, `Hashtbl`
- 对 fold、map 等高阶函数的讲解可中文化，但函数名保留

### 规则 3: 上下文判断
- `argument` vs `parameter`：
  - 函数**定义**时的参数用"形参"
  - 函数**调用**时的参数用"实参"
  - 如果原文未严格区分，统一用"参数"
  
### 规则 4: 列表项和表格统一
- 若同一列表/表格中出现相同概念，必须术语统一
- 例如不能同时出现"数据类型"和"类型"指代同一概念

### 规则 5: 章节标题和目录
- 章节名、习题名应保持原样或统一中文
- 不可在同一书中出现"Functions"和"函数"混用的情况

